<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient matching the provided image -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg_grad)"/>

  <!-- Minimalist Outline Cap (Konsep 3) -->
  <!-- Cap top diamond outline -->
  <path d="M32 18l18 10-18 10-18-10z" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Cap body/brim outline -->
  <path d="M18 28v6c0 3.5 6.5 6.5 14 6.5s14-3 14-6.5v-6" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Tassel string and ball -->
  <line x1="50" y1="28" x2="50" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="50" cy="42" r="2.5" fill="white"/>
</svg>
